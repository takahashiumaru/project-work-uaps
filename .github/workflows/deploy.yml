name: Deploy Laravel to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/project-work-uaps

            # 1. Pastikan MySQL Container masih hidup (Sesuai settingan terakhir Anda)
            if [ ! "$(docker ps -aq -f name=mysql_db)" ]; then
                echo "MySQL tidak ditemukan! Menyalakan ulang..."
                docker run -d --name mysql_db --restart unless-stopped \
                  -e MYSQL_ROOT_PASSWORD=rootpassword \
                  -e MYSQL_DATABASE=aps \
                  -e MYSQL_USER=umarvps \
                  -e MYSQL_PASSWORD=umarvps \
                  -p 3306:3306 \
                  mysql:8.2
            fi

            # 2. Ambil Dockerfile terbaru dari GitHub
            curl -sO https://raw.githubusercontent.com/takahashiumaru/project-work-uaps/main/Dockerfile

            # 3. Bersihkan RAM VPS dari sampah build sebelumnya
            docker builder prune -f

            # 4. Hapus aplikasi yang lama
            docker stop uaps-app || true
            docker rm uaps-app || true

            # 5. Build dan Jalankan Aplikasi Baru
            docker build -t image-uaps .
            docker run -d --name uaps-app --restart unless-stopped -p 80:80 --link mysql_db:db image-uaps