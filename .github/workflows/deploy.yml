name: Deploy Laravel via Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Perintah Deploy di VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 26088 # Pastikan port ini sesuai dengan port SSH VPS Anda
          script: |
            # Tentukan direktori kerja di VPS
            cd /home/ubuntu
            
            # 1. Cek & Clone Repositori (Jika belum ada)
            if [ ! -d "project-work-uaps" ]; then
              echo "Melakukan git clone..."
              git clone https://github.com/takahashiumaru/project-work-uaps.git project-work-uaps
            fi
            
            cd project-work-uaps
            
            # 2. Tarik update terbaru dari repositori
            git pull origin main
            
            # 3. Siapkan file .env jika belum ada (gunakan .env di host)
            if [ ! -f .env ]; then
              cp .env.example .env
              echo ".env file berhasil disiapkan dari template (.env.example)."
              echo "WAJIB: Segera edit .env di VPS jika menggunakan database berbeda."
            fi
            
            # 4. Deteksi apakah menggunakan 'docker compose' (V2) atau 'docker-compose' (V1)
            if docker compose version > /dev/null 2>&1; then
              DOCKER_COMPOSE="docker compose"
            else
              DOCKER_COMPOSE="docker-compose"
            fi
            
            echo "Menggunakan command: $DOCKER_COMPOSE"

            # 5. Build dan Jalankan Container
            echo "Membangun dan menjalankan container baru..."
            $DOCKER_COMPOSE down -v || true
            $DOCKER_COMPOSE up -d --build
            
            # 6. Optimasi Laravel di dalam container yang sedang berjalan
            echo "Menjalankan optimasi Laravel (Key, Migrate, Storage Link)..."
            $DOCKER_COMPOSE exec -T app php artisan key:generate --force
            $DOCKER_COMPOSE exec -T app php artisan migrate --force
            $DOCKER_COMPOSE exec -T app php artisan storage:link
            
            echo "Deployment Docker Selesai! Aplikasi berjalan di port 8000 (VPS IP:8000)."