name: Deploy Laravel to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/project-work-uaps

            echo "[1/6] Pull update terbaru"
            git pull origin main

            echo "[2/6] Rapikan permission storage & cache"
            sudo chgrp -R www-data storage bootstrap/cache
            sudo chmod -R ug+rwX storage bootstrap/cache
            sudo find storage bootstrap/cache -type d -exec chmod g+s {} \;

            echo "[3/6] Refresh storage link"
            rm -f public/storage
            php artisan storage:link

            echo "[4/6] Clear & rebuild cache"
            php artisan config:clear
            php artisan cache:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan optimize

            echo "[5/6] Restart PHP-FPM"
            sudo systemctl restart php8.3-fpm

            echo "[6/6] Reload Nginx"
            sudo systemctl reload nginx

            echo "Deploy selesai"