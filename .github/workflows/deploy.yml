name: Deploy Laravel via Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Perintah Deploy di VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 26088 # Pastikan port ini sesuai dengan port SSH VPS Anda
          script: |
            # Tentukan direktori kerja di VPS
            cd /home/ubuntu
            
            # 1. Cek & Clone Repositori (Jika belum ada)
            if [ ! -d "project-work-uaps" ]; then
              echo "Melakukan git clone..."
              git clone https://github.com/takahashiumaru/project-work-uaps.git project-work-uaps
            fi
            
            cd project-work-uaps
            
            # 2. Tarik update terbaru dari repositori
            git pull origin main
            
            # 3. Siapkan file .env jika belum ada (gunakan .env di host)
            if [ ! -f .env ]; then
              cp .env.example .env
              echo ".env file berhasil disiapkan dari template (.env.example)."
              echo "WAJIB: Segera edit .env di VPS jika menggunakan database berbeda."
            fi
            
            # 4. Build dan Jalankan Container menggunakan Docker Compose
            # --build: Membangun ulang image jika ada perubahan kode (PENTING!)
            # -d: Run in background mode
            echo "Membangun dan menjalankan container baru via Docker Compose..."
            docker compose down -v || true
            docker compose up -d --build
            
            # 5. Optimasi Laravel di dalam container yang sedang berjalan
            echo "Menjalankan optimasi Laravel (Key, Migrate, Storage Link)..."
            # -T: Disable allocation of a pseudo-TTY (untuk workflow otomatis)
            docker compose exec -T app php artisan key:generate --force
            docker compose exec -T app php artisan migrate --force
            docker compose exec -T app php artisan storage:link
            
            echo "Deployment Docker Selesai! Aplikasi berjalan di port 8000 (VPS IP:8000)."