name: Deploy Laravel to VPS (Port 8081)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Tentukan Workspace khusus project ini
            mkdir -p ~/project-work-8081/storage/app/public
            chmod -R 775 ~/project-work-8081/storage
            cd ~/project-work-8081

            # 2. Update Code
            if [ ! -d .git ]; then
                git clone https://github.com/takahashiumaru/project-work-uaps.git .
            else
                git pull origin main
            fi

            # 3. Gunakan Network yang sama atau baru
            docker network create uaps-network 2>/dev/null || true

            # 4. Cek Database (Hanya jalan jika belum ada)
            if [ ! "$(docker ps -aq -f name=mysql_db)" ]; then
                docker run -d --name mysql_db --restart unless-stopped \
                  --network uaps-network \
                  -e MYSQL_ROOT_PASSWORD=rootpassword \
                  -e MYSQL_DATABASE=aps \
                  -e MYSQL_USER=umarvps \
                  -e MYSQL_PASSWORD=umarvps \
                  -p 3306:3306 \
                  mysql:8.2
            else
                docker network connect uaps-network mysql_db 2>/dev/null || true
            fi

            # 5. Build Image dengan NAMA BARU (Bersihkan public/storage agar link tidak bermasalah)
            rm -rf public/storage
            docker build --pull -t image-uaps-8081 .

            # 6. Restart Container Aplikasi
            docker stop uaps-app-8081 || true
            docker rm uaps-app-8081 || true

            # MAPPING PORT: 8081 (Host VPS) -> 80 (Container)
            docker run -d --name uaps-app-8081 \
              --restart unless-stopped \
              --network uaps-network \
              -p 8081:80 \
              -e APP_KEY=${{ secrets.APP_KEY }} \
              -e DB_HOST=mysql_db \
              -e DB_DATABASE=aps \
              -e DB_USERNAME=umarvps \
              -e DB_PASSWORD=umarvps \
              -v ~/project-work-8081/storage/app/public:/var/www/html/storage/app/public \
              image-uaps-8081

            # 7. Pastikan storage:link berjalan (agar image muncul)
            docker exec uaps-app-8081 php artisan storage:link --force || true

            # 8. Bersihkan image lama yang tidak terpakai
            docker image prune -f