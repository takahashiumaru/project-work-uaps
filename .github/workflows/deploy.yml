name: Deploy Laravel via Docker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Perintah Deploy di VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 26088 # Pastikan port ini sesuai dengan port SSH VPS Anda
          script: |
            cd /home/ubuntu
            
            # 1. Cek & Clone Repositori
            if [ ! -d "project-work-uaps" ]; then
              echo "Melakukan git clone..."
              git clone https://github.com/takahashiumaru/project-work-uaps.git project-work-uaps
            fi
            
            cd project-work-uaps
            
            # 2. Tarik update terbaru
            git pull origin main
            
            # 3. Siapkan file .env di host VPS (Bukan di dalam image agar aman)
            if [ ! -f .env ]; then
              cp .env.example .env
              echo ".env file berhasil dibuat."
            fi
            
            # 4. Build Docker Image
            echo "Membangun Docker Image..."
            docker build -t laravel-app .
            
            # 5. Hapus container lama jika ada
            echo "Menghapus container lama..."
            docker rm -f web-laravel || true
            
            # 6. Jalankan Container Baru
            # Kita me-mount .env dan folder storage agar data tidak hilang saat container direstart
            echo "Menjalankan container baru..."
            docker run -d \
              --name web-laravel \
              -p 8000:8000 \
              -v $(pwd)/.env:/app/.env \
              -v $(pwd)/storage:/app/storage \
              --restart unless-stopped \
              laravel-app
              
            # 7. Generate Key, Migrate, dan Storage Link di DALAM container yang sedang berjalan
            echo "Menjalankan optimasi Laravel di dalam container..."
            docker exec web-laravel php artisan key:generate --force
            docker exec web-laravel php artisan migrate
            docker exec web-laravel php artisan storage:link
            
            echo "Deployment Docker Selesai! Aplikasi berjalan di port 8000."