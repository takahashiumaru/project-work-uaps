name: Deploy Laravel to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # 1. Bersihkan dan Siapkan Workspace
            mkdir -p ~/project-work-uaps
            cd ~/project-work-uaps

            # 2. Update Code di Host VPS (Bukan di dalam container)
            if [ ! -d .git ]; then
                git clone https://github.com/takahashiumaru/project-work-uaps.git .
            else
                git pull origin main
            fi

            # 3. Buat Network (Agar bisa saling ngobrol dengan nama container)
            docker network create uaps-network 2>/dev/null || true

            # 4. Pastikan Database berjalan
            if [ ! "$(docker ps -aq -f name=mysql_db)" ]; then
                docker run -d --name mysql_db --restart unless-stopped \
                  --network uaps-network \
                  -e MYSQL_ROOT_PASSWORD=rootpassword \
                  -e MYSQL_DATABASE=aps \
                  -e MYSQL_USER=umarvps \
                  -e MYSQL_PASSWORD=umarvps \
                  -p 3306:3306 \
                  mysql:8.2
            else
                # Pastikan container database terhubung ke network yang sama
                docker network connect uaps-network mysql_db 2>/dev/null || true
            fi

            # 5. Build Image Laravel dari kode terbaru
            docker build --pull -t image-uaps .

            # 6. Restart Container Aplikasi dengan port 8080
            docker stop uaps-app || true
            docker rm uaps-app || true

            # REVISI ADA DI SINI: -p 8080:80
            docker run -d --name uaps-app \
              --restart unless-stopped \
              --network uaps-network \
              -p 8080:80 \
              -e APP_KEY=${{ secrets.APP_KEY }} \
              -e DB_HOST=mysql_db \
              -e DB_DATABASE=aps \
              -e DB_USERNAME=umarvps \
              -e DB_PASSWORD=umarvps \
              image-uaps

            # 7. Bersihkan resource Docker (sampah image lama) yang tidak terpakai
            docker image prune -f