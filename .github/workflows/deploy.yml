name: Deploy Laravel to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Eksekusi Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 26088 # Sesuai port SSH VPS lu
          script: |
            PROJECT_DIR=$HOME/project-work-uaps
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR

            # 1. Update Source Code
            if [ ! -d ".git" ]; then
                git clone https://github.com/takahashiumaru/project-work-uaps.git .
            fi
            git fetch origin main
            git reset --hard origin/main

            # 2. Setup .ENV dari GitHub Secrets (Biar lu yang atur)
            echo "${{ secrets.LARAVEL_ENV }}" > .env
            
            # Paksa APP_URL ke IP VPS lu
            sed -i "s|APP_URL=.*|APP_URL=http://${{ secrets.VPS_IP }}:8000|" .env

            # 3. Pastikan Database Ready
            if [ ! "$(docker ps -q -f name=mysql_db)" ]; then
                docker rm -f mysql_db || true
                docker run -d --name mysql_db --restart unless-stopped \
                  -e MYSQL_ROOT_PASSWORD=rootpassword \
                  -e MYSQL_DATABASE=aps \
                  -e MYSQL_USER=umarvps \
                  -e MYSQL_PASSWORD=umarvps \
                  -v mysql_data:/var/lib/mysql \
                  -p 3306:3306 \
                  mysql:8.2
            fi

            # 4. Generate Dockerfile Pro (Nggak pake git clone di dalem)
            cat << 'EOF' > Dockerfile
            FROM php:8.2-fpm-alpine
            RUN apk add --no-cache curl bash libpng-dev libxml2-dev icu-dev oniguruma-dev zlib-dev libzip-dev shadow
            COPY --from=mlocati/php-extension-installer /usr/bin/install-php-extensions /usr/local/bin/
            RUN install-php-extensions pdo_mysql mbstring gd intl zip bcmath exif
            COPY --from=composer:latest /usr/bin/composer /usr/bin/composer
            WORKDIR /var/www/html
            COPY . .
            RUN composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            RUN chown -R www-data:www-data storage bootstrap/cache public && \
                chmod -R 775 storage bootstrap/cache public
            RUN php artisan storage:link || true
            EXPOSE 8000
            CMD php artisan config:cache && \
                php artisan route:cache && \
                php artisan view:cache && \
                php artisan migrate && \
                php artisan serve --host=0.0.0.0 --port=8000
            EOF

            # 5. Build & Jalankan
            docker build -t image-uaps .
            docker rm -f uaps-app || true
            docker run -d --name uaps-app \
              --restart unless-stopped \
              -p 8000:8000 \
              --link mysql_db:db \
              image-uaps

            # 6. Bersihin sampah image lama
            docker image prune -f