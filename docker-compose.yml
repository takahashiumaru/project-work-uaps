version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web-laravel
    restart: unless-stopped
    ports:
      # Memetakan port 8000 di VPS ke port 80 (Apache) di container
      - "8000:80"
    volumes:
      # Mount folder storage agar file upload tidak hilang saat container dihapus
      - ./storage:/var/www/html/storage
      # Mount file .env agar rahasia konfigurasi di host tetap terjaga
      - ./.env:/var/www/html/.env
    # Extra hosts: Mengizinkan container mengakses database yang ada di host VPS via 'host.docker.internal'
    extra_hosts:
      - "host.docker.internal:host-gateway"